name: Release Candidates

on:
  push:
    tags:
      - "release-*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
          - os: macos-latest
            label: macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.11"

      - name: Create environment
        shell: bash -el {0}
        run: conda env create -f environment.yml

      - name: Build package (includes tests)
        shell: bash -el {0}
        run: conda run -n pacifiershop python scripts/build.py

      - name: Package Windows executable
        if: matrix.label == 'windows'
        shell: pwsh
        run: Compress-Archive -Path "dist/PacifierShop/*" -DestinationPath "PacifierShop-windows-${{ github.ref_name }}.zip" -Force

      - name: Package macOS DMG
        if: matrix.label == 'macos'
        shell: bash
        run: |
          hdiutil create \
            -volname "PacifierShop" \
            -srcfolder "dist/PacifierShop.app" \
            -ov \
            -format UDZO \
            "PacifierShop-macos-${GITHUB_REF_NAME}.dmg"

      - name: Upload Windows artifact
        if: matrix.label == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: PacifierShop-windows-${{ github.ref_name }}.zip

      - name: Upload macOS artifact
        if: matrix.label == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: PacifierShop-macos-${{ github.ref_name }}.dmg

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/*.zip
            release-assets/*.dmg
